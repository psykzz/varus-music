server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker: must be served with the correct MIME type and must
    # never be cached by the browser (browsers check for SW updates on
    # every navigation; a stale cached sw.js means updates are never seen).
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Serve the SPA - fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy static music file requests to the backend
    location /files/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache audio files aggressively
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
